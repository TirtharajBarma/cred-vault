services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: credvault-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Sql@Password!123
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - project_sqlserver_data:/var/opt/mssql
      - sqlserver_data:/var/opt/mssql/legacy
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Sql@Password!123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: credvault-rabbitmq
    hostname: e763e30e4c60
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      - RABBITMQ_NODENAME=rabbit@e763e30e4c60
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  project_sqlserver_data:
    external: true
    name: project_sqlserver_data
  sqlserver_data:
    external: true
    name: sqlserver_data
  rabbitmq_data:
    external: true
    name: 0de57c4003f3abcf52c31acf5780b96e774af5d51998e2be0c03c37d2d393af5
