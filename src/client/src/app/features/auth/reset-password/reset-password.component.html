<div class="flex h-screen w-full overflow-hidden bg-background-light">
  <!-- Left Side: Cinematic Hero Section -->
  <div class="hidden lg:flex relative w-1/2 h-full items-center justify-center hero-gradient overflow-hidden">
    <!-- Floating Glow Clouds -->
    <div class="glow-cloud-amber top-1/4 left-1/4 animate-slow-drift"></div>
    <div class="glow-cloud-blue bottom-1/4 right-1/4 animate-slow-drift" style="animation-delay: -5s"></div>
    
    <div class="relative z-10 text-center px-12">
      <div class="mb-8 flex justify-center">
        <div class="p-6 bg-white/40 backdrop-blur-md rounded-full shadow-xl border border-white/50">
          <span class="material-symbols-outlined text-primary text-6xl fill-icon">published_with_changes</span>
        </div>
      </div>
      <h1 class="text-5xl font-extrabold tracking-tight mb-4 text-charcoal">Redefine Security</h1>
      <p class="text-lg text-charcoal/70 max-w-md mx-auto leading-relaxed">
        Verify your ownership with the code we sent and choose a strong new password for your premium vault.
      </p>
    </div>
  </div>

  <!-- Right Side: Reset Form -->
  <div class="w-full lg:w-1/2 h-full flex items-center justify-center p-6 bg-background-light sm:p-12 relative overflow-y-auto">
    <div class="lg:hidden absolute inset-0 hero-gradient -z-10 opacity-50"></div>
    
    <div class="w-full max-w-md py-12">
      <div class="glass-card p-10 rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)]">
        <div class="mb-10 text-center">
          <h2 class="text-3xl font-black text-charcoal mb-3">Set New Password</h2>
          <p class="text-misty-gray font-medium">Verify your OTP to reset your access.</p>
        </div>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="space-y-1.5">
            <label class="text-xs font-black text-charcoal/50 uppercase tracking-widest ml-1">Email</label>
            <input type="email" formControlName="email" class="premium-input px-5 h-12" readonly />
          </div>

          <div class="space-y-1.5">
            <label class="text-xs font-black text-charcoal/50 uppercase tracking-widest ml-1">6-Digit OTP</label>
            <input type="text" formControlName="otp" maxlength="6" class="premium-input px-5 h-12 text-center text-xl font-bold tracking-widest" placeholder="000000" />
          </div>

          <div class="space-y-1.5">
            <label class="text-xs font-black text-charcoal/50 uppercase tracking-widest ml-1">New Password</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-charcoal/30">lock</span>
              <input type="password" formControlName="newPassword" class="premium-input pl-12 pr-5 h-12" placeholder="••••••••" />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-xs font-black text-charcoal/50 uppercase tracking-widest ml-1">Confirm New Password</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-charcoal/30">shield</span>
              <input type="password" formControlName="confirmPassword" class="premium-input pl-12 pr-5 h-12" placeholder="••••••••" />
            </div>
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage()" class="p-4 rounded-2xl bg-red-50 border border-red-100 text-red-600 text-sm font-medium text-center animate-pulse">
            {{ errorMessage() }}
          </div>

          <div class="pt-4">
            <button type="submit" [disabled]="resetForm.invalid || isLoading()" class="premium-button">
              <span *ngIf="!isLoading()">Update Password</span>
              <span *ngIf="isLoading()" class="flex items-center gap-2">
                <span class="size-4 border-2 border-charcoal/20 border-t-charcoal rounded-full animate-spin"></span>
                Processing...
              </span>
              <span class="material-symbols-outlined font-bold">verified_user</span>
            </button>
          </div>
        </form>

        <div class="mt-8 text-center text-[10px] font-black uppercase tracking-widest text-misty-gray">
          <a routerLink="/login" class="hover:text-charcoal transition-colors">Back to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
