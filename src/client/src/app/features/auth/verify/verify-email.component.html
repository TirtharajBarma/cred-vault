<div class="flex h-screen w-full overflow-hidden bg-background-light">
  <!-- Left Side: Cinematic Hero Section -->
  <div class="hidden lg:flex relative w-1/2 h-full items-center justify-center hero-gradient overflow-hidden">
    <!-- Floating Glow Clouds -->
    <div class="glow-cloud-amber top-1/4 left-1/4 animate-slow-drift"></div>
    <div class="glow-cloud-blue bottom-1/4 right-1/4 animate-slow-drift" style="animation-delay: -5s"></div>
    
    <div class="relative z-10 text-center px-12 text-charcoal">
       <div class="mb-8 flex justify-center">
        <div class="p-6 bg-white/40 backdrop-blur-md rounded-full shadow-xl border border-white/50">
          <span class="material-symbols-outlined text-primary text-6xl fill-icon">shield</span>
        </div>
      </div>
      <h1 class="text-5xl font-extrabold tracking-tight mb-4">Validate Your Access</h1>
      <p class="text-lg text-charcoal/70 max-w-md mx-auto leading-relaxed">
        We've prioritized your security. Please enter the 6-digit code sent to your registered email to continue.
      </p>
    </div>
  </div>

  <!-- Right Side: OTP Form -->
  <div class="w-full lg:w-1/2 h-full flex items-center justify-center p-6 bg-background-light sm:p-12 relative">
    <!-- Mobile Background Decoration -->
    <div class="lg:hidden absolute inset-0 hero-gradient -z-10 opacity-50"></div>
    
    <div class="w-full max-w-md">
      <div class="glass-card p-10 rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)]">
        <div class="mb-10 text-center">
          <h2 class="text-3xl font-black text-charcoal mb-3">Verify Identity</h2>
          <p class="text-misty-gray font-medium">Entering the code sent to your email.</p>
        </div>

        <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()" class="space-y-8">
          <div class="space-y-4">
            <label class="text-xs font-black text-charcoal/50 uppercase tracking-widest block text-center">OTP Code</label>
            <div class="flex justify-center">
                <input 
                    type="text" 
                    formControlName="otp" 
                    maxlength="6"
                    class="w-full h-16 bg-white/50 border-white/80 border-2 rounded-2xl text-center text-3xl font-black tracking-[0.75em] pl-[0.75em] focus:ring-4 focus:ring-honey-amber/10 focus:border-honey-amber outline-none transition-all duration-300"
                    placeholder="000000"
                />
            </div>
            <p class="text-center text-[10px] text-misty-gray font-bold uppercase tracking-widest">
                6-digit security code
            </p>
          </div>

          <!-- Error & Success Messages -->
          <div *ngIf="errorMessage()" class="p-4 rounded-2xl bg-red-50 border border-red-100 text-red-600 text-sm font-medium text-center animate-pulse">
            {{ errorMessage() }}
          </div>
          <div *ngIf="successMessage()" class="p-4 rounded-2xl bg-green-50 border border-green-100 text-green-600 text-sm font-medium text-center animate-pulse">
            {{ successMessage() }}
          </div>

          <div class="pt-4">
            <button type="submit" [disabled]="verifyForm.invalid || isLoading()" class="premium-button">
              <span *ngIf="!isLoading()">Verify & Activate</span>
               <span *ngIf="isLoading()" class="flex items-center gap-2">
                <span class="size-4 border-2 border-charcoal/20 border-t-charcoal rounded-full animate-spin"></span>
                Verifying...
              </span>
              <span class="material-symbols-outlined font-bold">verified</span>
            </button>
          </div>
        </form>

        <div class="mt-10 text-center">
            <button 
                (click)="onResend()" 
                [disabled]="!canResend()" 
                class="text-sm font-bold text-misty-gray hover:text-primary transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
                Didn't receive code? 
                <span *ngIf="!canResend()" class="ml-1 text-charcoal/40">Resend in {{ resendCountdown() }}s</span>
                <span *ngIf="canResend()" class="ml-1 text-primary underline underline-offset-4">Resend OTP Now</span>
            </button>
        </div>
      </div>
      
      <div class="mt-8 text-center text-[10px] font-black uppercase tracking-widest text-misty-gray">
          <a routerLink="/register" class="hover:text-charcoal transition-colors">Back to Registration</a>
      </div>
    </div>
  </div>
</div>
