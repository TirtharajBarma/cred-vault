<div class="relative min-h-screen bg-mist-cream font-sans flex items-center justify-center p-6 overflow-hidden text-charcoal">
  <!-- Animated Atmospheric Glows -->
  <div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-honey-amber/10 blur-[120px] animate-slow-drift"></div>
  <div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-misty-gray/20 blur-[120px] animate-slow-drift" style="animation-delay: -5s"></div>

  <div class="relative z-10 w-full max-w-6xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
    <!-- Left Side: Hero Visualization -->
    <div class="hidden lg:flex flex-col items-center justify-center relative">
      <div class="relative w-96 h-96 flex items-center justify-center">
        <div class="absolute inset-0 border border-charcoal/5 rounded-full animate-slow-pulse"></div>
        <div class="absolute inset-12 border border-charcoal/10 rounded-full animate-slow-pulse" style="animation-delay: 1s"></div>
        <div class="absolute inset-24 border border-charcoal/20 rounded-full animate-slow-pulse" style="animation-delay: 2s"></div>
        <div class="bg-white/40 backdrop-blur-3xl border border-white/50 w-40 h-40 rounded-3xl shadow-2xl flex items-center justify-center rotate-12 transform hover:rotate-0 transition-transform duration-700">
          <span class="material-symbols-outlined text-6xl text-honey-amber fill-icon">shield_lock</span>
        </div>
      </div>
      <div class="mt-12 text-center max-w-sm">
        <h2 class="text-4xl font-black tracking-tight mb-4">The gold standard for your digital assets.</h2>
        <p class="text-misty-gray font-medium">Secure, intuitive, and designed for the modern enterprise.</p>
      </div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="flex flex-col items-center">
      <!-- Mobile Logo -->
      <div class="lg:hidden flex flex-col items-center mb-8">
        <div class="size-12 bg-honey-amber rounded-xl flex items-center justify-center text-charcoal shadow-lg mb-3">
          <span class="material-symbols-outlined text-3xl font-bold">shield_lock</span>
        </div>
        <h2 class="text-2xl font-black tracking-tight">CredVault</h2>
      </div>

      <!-- Premium Glass Card -->
      <div class="w-full max-w-md glass-card rounded-[2.5rem] p-10 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)]">
        <div class="mb-10 text-center">
          <h1 class="text-charcoal text-4xl font-black tracking-tight mb-3 text-center">Welcome Back</h1>
          <p class="text-misty-gray font-medium">Access your high-security vault</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="space-y-2">
            <label class="text-charcoal/70 text-xs font-black uppercase tracking-widest ml-1">Email Address</label>
            <div class="group">
              <input 
                type="email" 
                formControlName="email" 
                class="premium-input px-6 h-14" 
                placeholder="name@company.com" 
              />
            </div>
          </div>

          <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
              <label class="text-charcoal/70 text-xs font-black uppercase tracking-widest">Password</label>
              <a routerLink="/forgot-password" class="text-honey-amber text-xs font-black hover:opacity-80 transition-opacity">Forgot?</a>
            </div>
            <div class="relative group">
              <input 
                [type]="showPassword() ? 'text' : 'password'" 
                formControlName="password" 
                class="premium-input px-6 pr-12 h-14" 
                placeholder="••••••••" 
              />
              <button 
                type="button" 
                (click)="togglePassword()"
                class="absolute right-5 top-1/2 -translate-y-1/2 text-misty-gray hover:text-charcoal transition-colors"
              >
                <span class="material-symbols-outlined text-xl">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
          </div>

          <div class="flex items-center gap-3 px-1">
            <input 
                type="checkbox" 
                id="remember" 
                class="w-5 h-5 rounded-md border-white/80 text-honey-amber focus:ring-honey-amber/30 bg-white/50 cursor-pointer"
            />
            <label for="remember" class="text-charcoal/60 text-sm font-medium cursor-pointer select-none">Keep me signed in</label>
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage()" class="p-4 rounded-2xl bg-red-50 border border-red-100 text-red-600 text-sm font-medium text-center animate-pulse">
            {{ errorMessage() }}
          </div>

          <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="premium-button">
            <span *ngIf="!isLoading()">Unlock Vault</span>
             <span *ngIf="isLoading()" class="flex items-center gap-2">
                <span class="size-4 border-2 border-charcoal/20 border-t-charcoal rounded-full animate-spin"></span>
                Processing...
              </span>
            <span class="material-symbols-outlined text-xl font-bold">arrow_forward</span>
          </button>
        </form>

        <div class="mt-10">
          <div class="relative flex items-center mb-8">
            <div class="flex-grow border-t border-charcoal/10"></div>
            <span class="flex-shrink mx-4 text-misty-gray text-[10px] font-black uppercase tracking-widest">Express Login</span>
            <div class="flex-grow border-t border-charcoal/10"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <button class="flex items-center justify-center gap-3 h-12 bg-white/60 border border-white rounded-xl hover:bg-white transition-all duration-300 shadow-sm">
              <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtJETqJiaZRch0HWuS6B4PFpsxTrGcMrRg8ZflpHkVQY1DXPEkJfuUOs9QvQSmzzhzQw0AdXAaCkrgTwFVp51gv-7ZrrNhte3blIoVFqIFlOPKe0TLLaHJO39PP5tlkOH-CV8UGKvhOOrgxrZXDW2EzYWl7h6wYGr9i9Hg9gtflbHjDOccPplZMf1ABPYE7x7-VP4niEl87o6mIPqcMN2bP8DQ0TSWFVZbrJKNxqa0_IUrrv30BYOOUGgc00hEfa3NCFZZIybr_4eD" alt="Google" class="size-5">
              <span class="text-charcoal text-sm font-bold">Google</span>
            </button>
            <button class="flex items-center justify-center gap-3 h-12 bg-white/60 border border-white rounded-xl hover:bg-white transition-all duration-300 shadow-sm">
              <span class="material-symbols-outlined text-charcoal text-xl">fingerprint</span>
              <span class="text-charcoal text-sm font-bold">SSO</span>
            </button>
          </div>
        </div>

        <div class="mt-8 pt-8 border-t border-charcoal/5 text-center">
          <p class="text-misty-gray text-sm font-bold">
            Don't have an account? 
            <a routerLink="/register" class="text-honey-amber hover:underline underline-offset-4 transition-all duration-300 ml-1">Register</a>
          </p>
        </div>
      </div>

      <footer class="mt-12 flex justify-center items-center gap-8 text-misty-gray text-[10px] font-black uppercase tracking-widest">
        <a href="#" class="hover:text-honey-amber transition-colors">Terms</a>
        <div class="size-1 rounded-full bg-misty-gray/30"></div>
        <a href="#" class="hover:text-honey-amber transition-colors">Privacy</a>
        <div class="size-1 rounded-full bg-misty-gray/30"></div>
        <a href="#" class="hover:text-honey-amber transition-colors">Support</a>
      </footer>
    </div>
  </div>
</div>
