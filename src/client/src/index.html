<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CredVault | Premium Security</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Environment Variables -->
  <script>
    window.__env = {
      apiGatewayUrl: (function() {
        var host = window.location.hostname;
        var port = window.location.port;
        var protocol = window.location.protocol;
        // For production, use relative URL (same origin)
        if (host !== 'localhost' && host !== '127.0.0.1') {
          return protocol + '//' + host + (port ? ':' + port : '');
        }
        // For development, use configured gateway
        return 'http://localhost:5006';
      })()
    };
  </script>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=Manrope:wght@200..800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
